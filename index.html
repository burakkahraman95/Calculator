<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Receipt Calculator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="calc-page">
      <div class="calc-wrapper">

        <!-- Header -->
        <div class="calc-header">
          <span class="calc-title">RECEIPT CALC</span>
        </div>

        <!-- Screen -->
        <div class="calc-screen">
          <div class="screen-label">FORMULA</div>
          <div class="screen-formula" id="screen" aria-live="polite">
            <span class="screen-placeholder" id="placeholder">0</span>
          </div>
          <div class="screen-error" id="error-msg"></div>
        </div>

        <!-- Button Grid -->
        <div class="calc-buttons">
          <button class="calc-btn btn-action" onclick="clearFormula()">CLR</button>
          <button class="calc-btn btn-action" onclick="backspace()">&#x232B;</button>
          <button class="calc-btn btn-op"     onclick="append('*0.01')">%</button>
          <button class="calc-btn btn-op"     onclick="append('*0.0001')">&#x2030;</button>

          <button class="calc-btn btn-op"     onclick="append('**2')">x&sup2;</button>
          <button class="calc-btn btn-op"     onclick="append('**3')">x&sup3;</button>
          <button class="calc-btn btn-op"     onclick="append('(')">(</button>
          <button class="calc-btn btn-op"     onclick="append(')')">)</button>

          <button class="calc-btn btn-digit"  onclick="append('7')">7</button>
          <button class="calc-btn btn-digit"  onclick="append('8')">8</button>
          <button class="calc-btn btn-digit"  onclick="append('9')">9</button>
          <button class="calc-btn btn-op"     onclick="append('/')">&divide;</button>

          <button class="calc-btn btn-digit"  onclick="append('4')">4</button>
          <button class="calc-btn btn-digit"  onclick="append('5')">5</button>
          <button class="calc-btn btn-digit"  onclick="append('6')">6</button>
          <button class="calc-btn btn-op"     onclick="append('*')">&times;</button>

          <button class="calc-btn btn-digit"  onclick="append('1')">1</button>
          <button class="calc-btn btn-digit"  onclick="append('2')">2</button>
          <button class="calc-btn btn-digit"  onclick="append('3')">3</button>
          <button class="calc-btn btn-op"     onclick="append('-')">&minus;</button>

          <button class="calc-btn btn-digit span-col-2" onclick="append('0')">0</button>
          <button class="calc-btn btn-digit"  onclick="append('.')">.</button>
          <button class="calc-btn btn-op"     onclick="append('+')">+</button>

          <button class="calc-btn btn-return span-col-4" onclick="evaluateFormula()">RETURN</button>
        </div>

        <!-- Receipt -->
        <div class="receipt-wrapper">
          <div class="receipt-header">
            <div class="receipt-dots">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="receipt-title">&#x2605; RECEIPT &#x2605;</div>
            <div class="receipt-dots">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <div class="receipt-scroll" id="receipt">
            <div class="receipt-empty" id="receipt-empty">No calculations yet</div>
          </div>
          <div class="receipt-footer">
            <div class="receipt-dots">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="receipt-total-label">ENTRIES: <span id="entry-count">0</span></div>
          </div>
        </div>

      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
